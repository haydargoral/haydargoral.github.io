        <style>
            /* SPEED & VISIBILITY OPTIMIZATION */
            body { opacity: 1 !important; visibility: visible !important; }
            .preloader { display: none !important; }

            /* STATIC HEADER NAVIGATION (Matches Talks Page) */
            .navbar-header { float: left; }
            
            .btn-return-home {
                display: inline-block;
                margin-top: 12px;
                padding: 8px 20px;
                border: 2px solid #333;
                background: #333;
                color: #fff !important;
                border-radius: 4px;
                font-weight: 700;
                text-transform: uppercase;
                font-size: 12px;
                transition: all 0.3s ease;
            }
            .btn-return-home:hover {
                background: transparent;
                color: #333 !important;
                text-decoration: none;
            }
            .btn-return-home i { margin-right: 8px; }

            .navbar-nav { margin-top: 12px; margin-bottom: 0; }
            .navbar-nav li a {
                border: 1px solid #333 !important;
                padding: 8px 18px !important;
                margin-left: 10px;
                margin-right: 10px;
                border-radius: 4px;
                transition: all 0.3s ease;
                text-transform: uppercase;
                font-size: 12px;
                font-weight: 700;
                color: #333 !important;
                background: transparent;
            }
            .navbar-nav li a:hover {
                background: #333 !important;
                color: #fff !important;
            }

            /* HERO HEADER */
            .main-page-header {
                padding: 80px 0 40px;
                text-align: center;
                background: #fdfdfd;
                border-bottom: 1px solid #eee;
            }
            .main-page-header h1 {
                font-weight: 700;
                font-size: 42px;
                text-transform: uppercase;
                letter-spacing: 3px;
                color: #222;
                margin: 0;
            }
            .main-page-header .underline {
                width: 60px;
                height: 4px;
                background: #333;
                margin: 20px auto 0;
            }

            /* PROJECTS SECTION */
            .projects-section { padding: 60px 0 80px; }
            
            .project-card {
                background: #fff;
                border: 1px solid #eee;
                margin-bottom: 30px;
                padding: 30px;
                border-radius: 4px;
                transition: 0.3s ease;
            }
            .project-card:hover {
                box-shadow: 0 10px 20px rgba(0,0,0,0.05);
                border-color: #ddd;
            }

            .project-tag { 
                font-size: 10px; 
                background: #f4f4f4; 
                padding: 3px 12px; 
                text-transform: uppercase; 
                color: #666; 
                margin-bottom: 15px; 
                display: inline-block;
                border-radius: 20px;
                font-weight: 700;
            }

            .project-title { 
                font-weight: 700; 
                margin-bottom: 15px; 
                color: #222; 
                text-transform: uppercase; 
                letter-spacing: 1px;
                font-size: 22px;
            }

            .project-description { 
                font-size: 14px; 
                color: #555; 
                line-height: 1.7; 
                margin-bottom: 20px;
            }

            .tech-stack {
                margin-bottom: 20px;
            }
            .tech-item {
                font-size: 12px;
                color: #888;
                margin-right: 15px;
                font-family: 'Courier New', Courier, monospace;
            }

            .btn-project { 
                background: transparent; 
                border: 1px solid #333; 
                color: #333; 
                padding: 8px 20px; 
                font-size: 11px; 
                font-weight: 700;
                transition: 0.3s;
                text-transform: uppercase;
                border-radius: 4px;
            }
            .btn-project:hover { background: #333; color: #fff; text-decoration: none; }

            .footer { padding: 40px 0; border-top: 1px solid #eee; }
        </style>
